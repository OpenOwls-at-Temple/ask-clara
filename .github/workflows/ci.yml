name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://clara:clara@localhost:5432/clara
      MONGODB_URI: mongodb://localhost:27017/clara
      GOOGLE_CLIENT_ID: test-client-id
      GOOGLE_CLIENT_SECRET: test-client-secret
      JWT_SECRET: test-jwt-secret-for-ci
      ANTHROPIC_API_KEY: test-key
      ENVIRONMENT: local

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: clara
          POSTGRES_PASSWORD: clara
          POSTGRES_DB: clara
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python -m alembic upgrade head

      - name: Lint (black)
        run: black --check app/

      - name: Test
        run: pytest

  frontend:
    name: Frontend — lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npx eslint src/ --max-warnings=0

      - name: Test
        run: npm test

  e2e:
    name: E2E — Playwright critical path
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql+asyncpg://clara:clara@localhost:5432/clara
      MONGODB_URI: mongodb://localhost:27017/clara
      GOOGLE_CLIENT_ID: test-client-id
      GOOGLE_CLIENT_SECRET: test-client-secret
      JWT_SECRET: test-jwt-secret-for-ci
      ANTHROPIC_API_KEY: test-key
      ENVIRONMENT: local
      LLM_PROVIDER: mock
      TEST_LOGIN_SECRET: e2e-ci-secret

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: clara
          POSTGRES_PASSWORD: clara
          POSTGRES_DB: clara
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run migrations
        working-directory: backend
        run: python -m alembic upgrade head

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7
